
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handmade Amp Catalog</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #252525;
            --text-color: #e0e0e0;
            --point-color: #4CAF50;
            --accent-color: #ff6600;
        }

        /* 스무스 스크롤 추가 */
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            line-height: 1.6;
            text-align: center;
            /* 텍스트 렌더링 최적화 */
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 50px 20px;
            background: #111;
        }

        header h1 { color: var(--point-color); margin: 0; }
        .motto { font-style: italic; color: #888; margin-top: 10px; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .amp-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #333;
            /* 깜빡임 방지 최적화 */
            transition: transform 0.3s ease, border-color 0.3s ease;
            will-change: transform;
            backface-visibility: hidden;
        }

        .amp-card:hover {
            border-color: var(--point-color);
            transform: translateY(-5px);
        }

        .amp-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            background: #000;
            /* 이미지 로딩 시 깜빡임 방지 */
            display: block;
        }

        .amp-card h3 { margin: 15px 0 10px; color: #fff; }
        .price { color: var(--accent-color); font-weight: bold; }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: var(--point-color);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.8; }

        footer {
            margin: 50px 0 100px;
            padding: 20px;
            border-top: 1px solid #333;
        }

        .archive-link {
            color: #aaa;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Amp Works</h1>
        <p>세상에 하나뿐인 나만의 사운드를 만듭니다.</p>
        <div class="motto">"꿈을 날짜와 함께 적으면 목표가 되고, 실행에 옮기면 현실이 된다."</div>
    </header>

    <div class="container">
        <div class="amp-card">
            <img src="images/amp1.jpg" alt="Class A 앰프" loading="lazy" onerror="this.onerror=null; this.src='https://via.placeholder.com/300x200?text=No+Image'">
            <h3>Class A 트랜지스터 앰프</h3>
            <p>풍부한 배음과 따뜻한 음색을 자랑하는 A급 증폭 회로입니다.</p>
            <p class="price">판매가: 50,000원 (회로도+지시서)</p>
            <a href="mailto:pip49@example.com" class="btn">구매 문의하기</a>
        </div>

        <div class="amp-card">
            <img src="images/amp2.jpg" alt="블루스 톤 프리앰프" loading="lazy" onerror="this.onerror=null; this.src='https://via.placeholder.com/300x200?text=No+Image'">
            <h3>블루스 톤 프리앰프</h3>
            <p>기타 연주자를 위한 최적화된 톤 컨트롤 회로 가이드입니다.</p>
            <p class="price">판매가: 45,000원</p>
            <a href="#" class="btn">카톡 오픈챗 문의</a>
        </div>
    </div> <footer>
        <p>문의: pip49@example.com</p>
        <p>
            <a href="#" class="archive-link">지난 상품(아카이브) 보러가기</a>
        </p>
    </footer>

</body>
</html>
